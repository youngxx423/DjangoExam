{% extends "base.html" %}
{% block title %}发布考试{% endblock title %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-xl-9">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <h4 class="mb-4">发布考试</h4>
                {% if message %}
                <div class="alert alert-warning">{{ message }}</div>
                {% endif %}
                <form method="post" class="row g-3">
                    {% csrf_token %}
                    <div class="col-md-6">
                        <label class="form-label">考试标题</label>
                        <input type="text" class="form-control" name="title" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">考试科目</label>
                        <select class="form-select" name="course" required>
                            {% for course in courses %}
                            <option value="{{ course.id }}">{{ course.course_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">适用专业</label>
                        <select class="form-select" name="major" required>
                            {% for major in majors %}
                            <option value="{{ major.id }}">{{ major.major }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-12">
                        <label class="form-label">选择题目（可多选）</label>
                        <select class="form-select" name="questions" multiple required size="8">
                            {% for question in questions %}
                            <option value="{{ question.id }}">{{ question.title }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">时间限制（分钟）</label>
                        <input type="number" class="form-control" name="time_limit" min="1" required>
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary">发布考试</button>
                        <a href="{% url 'teacher_dashboard' %}" class="btn btn-outline-secondary">返回</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
