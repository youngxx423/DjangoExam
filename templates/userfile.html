{% extends "base.html" %}
{% block title %}个人信息{% endblock title %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-8">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <h4 class="mb-3">个人信息</h4>
                <div class="table-responsive">
                    <table class="table align-middle mb-0">
                        <tbody>
                        <tr><th style="width: 140px;">学号</th><td>{{ student.sid }}</td></tr>
                        <tr><th>姓名</th><td>{{ student.name }}</td></tr>
                        <tr><th>性别</th><td>{% if student.sex %}男{% else %}女{% endif %}</td></tr>
                        <tr><th>学院</th><td>{{ student.academy }}</td></tr>
                        <tr><th>专业</th><td>{{ student.major }}</td></tr>
                        <tr><th>邮箱地址</th><td>{{ student.email }}</td></tr>
                        <tr><th>班级</th><td>{{ student.sclass }}</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
