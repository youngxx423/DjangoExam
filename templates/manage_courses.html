{% extends "base.html" %}
{% block title %}管理课程{% endblock title %}
{% block content %}
<div class="row g-4">
    <div class="col-12 col-lg-6">
        <div class="card border-0 shadow-sm h-100">
            <div class="card-body">
                <h4 class="mb-3">课程列表</h4>
                <ul class="list-group">
                    {% for course in courses %}
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        <span>{{ course.course_name }} <small class="text-secondary">({{ course.course_id }})</small></span>
                        <a href="{% url 'delete_course' course.id %}" class="btn btn-sm btn-outline-danger">删除</a>
                    </li>
                    {% empty %}
                    <li class="list-group-item text-secondary">暂无课程</li>
                    {% endfor %}
                </ul>
            </div>
        </div>
    </div>
    <div class="col-12 col-lg-6">
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body">
                <h5 class="mb-3">添加课程</h5>
                <form method="post" action="{% url 'manage_courses' %}" class="row g-2">
                    {% csrf_token %}
                    <div class="col-12">
                        <input type="text" class="form-control" name="new_course_name" placeholder="课程名称" required>
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary">添加课程</button>
                    </div>
                </form>
            </div>
        </div>
        <div class="card border-0 shadow-sm">
            <div class="card-body">
                <h5 class="mb-3">编辑课程</h5>
                <form method="post" action="{% url 'manage_courses' %}" class="row g-2">
                    {% csrf_token %}
                    <div class="col-12">
                        <select class="form-select" name="course_id" required>
                            {% for course in courses %}
                            <option value="{{ course.id }}">{{ course.course_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-12">
                        <input type="text" class="form-control" name="updated_course_name" placeholder="新的课程名称" required>
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-outline-primary">保存修改</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
